name: G7 Market Data Daily Update

on:
  schedule:
    # UTC 기준 00:00은 한국 시간(KST)으로 오전 09:00입니다.
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동으로 즉시 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository content
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas openpyxl

    - name: Run Python script
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add g7_market_data.xlsx
        git commit -m "Update daily G7 market data $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
