name: G7 Market Data Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # 한국 시간 아침 9시
  workflow_dispatch: # 수동 실행 버튼

# Node.js 24 환경을 강제로 활성화하여 2026년 시스템 변화에 대응
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN에 대한 쓰기 권한을 코드상에서 한 번 더 명시 (매우 중요)
    permissions:
      contents: write

    steps:
    - name: Checkout repository content
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 최신 파이썬 버전 사용

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas openpyxl

    - name: Run Python script
      run: python hivefive.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 파일이 생성되었는지 확인 후 추가
        if [ -f g7_market_data.xlsx ]; then
          git add g7_market_data.xlsx
          # 변경사항이 있을 때만 커밋, 없으면 무시
          git commit -m "Update daily G7 market data $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
        else
          echo "Error: g7_market_data.xlsx file not found."
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
