name: G7_Finance_Auto_Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run_data_bot:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃 (최신 v4)
        uses: actions/checkout@v4

      - name: 파이썬 세팅 (최신 v5)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 도구 설치
        run: pip install yfinance pandas openpyxl

      - name: 데이터 수집 실행
        run: python main.py

      - name: 결과 저장 및 업데이트
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "데이터 자동 업데이트: $(date +'%Y-%m-%d')" || echo "변경사항 없음"
          git push
