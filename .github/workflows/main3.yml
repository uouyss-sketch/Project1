name: G7 Market Data Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # 한국 시간 아침 9시
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository content
      uses: actions/checkout@v4 # v3에서 v4로 업데이트

    - name: Set up Python
      uses: actions/setup-python@v5 # v4에서 v5로 업데이트
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas openpyxl

    - name: Run Python script
      run: python main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # 엑셀 파일이 있으면 스테이징, 없으면 무시
        git add g7_market_data.xlsx || echo "No file to add"
        # 변경사항이 있을 때만 커밋
        git commit -m "Update daily G7 market data $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
